services:
  postgres:
    image: postgres:16-alpine
    container_name: triploom-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: triploom
      POSTGRES_PASSWORD: triploom
      POSTGRES_DB: triploom
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
