services:
  postgres:
    image: postgres:16-alpine
    container_name: triploom-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: triploom
      POSTGRES_PASSWORD: triploom
      POSTGRES_DB: triploom
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ── SigNoz (observability) ────────────────────────────────────────
  # Start with: docker compose --profile signoz up -d
  # UI: http://localhost:8080 | OTLP HTTP: localhost:4318 | OTLP gRPC: localhost:4317

  signoz-init-clickhouse:
    profiles: [signoz]
    image: clickhouse/clickhouse-server:25.5.6
    container_name: signoz-init-clickhouse
    command:
      - bash
      - -c
      - |
        version="v0.0.1"
        node_os=$$(uname -s | tr '[:upper:]' '[:lower:]')
        node_arch=$$(uname -m | sed s/aarch64/arm64/ | sed s/x86_64/amd64/)
        echo "Fetching histogram-binary for $${node_os}/$${node_arch}"
        cd /tmp
        wget -O histogram-quantile.tar.gz "https://github.com/SigNoz/signoz/releases/download/histogram-quantile%2F$${version}/histogram-quantile_$${node_os}_$${node_arch}.tar.gz"
        tar -xvzf histogram-quantile.tar.gz
        mv histogram-quantile /var/lib/clickhouse/user_scripts/histogramQuantile
    restart: on-failure
    volumes:
      - signoz_user_scripts:/var/lib/clickhouse/user_scripts/
    networks:
      - signoz-net
    logging:
      options:
        max-size: 50m
        max-file: "3"

  signoz-zookeeper:
    profiles: [signoz]
    image: signoz/zookeeper:3.7.1
    container_name: signoz-zookeeper
    restart: unless-stopped
    user: root
    volumes:
      - signoz_zookeeper:/bitnami/zookeeper
    environment:
      - ZOO_SERVER_ID=1
      - ALLOW_ANONYMOUS_LOGIN=yes
      - ZOO_AUTOPURGE_INTERVAL=1
      - ZOO_ENABLE_PROMETHEUS_METRICS=yes
      - ZOO_PROMETHEUS_METRICS_PORT_NUMBER=9141
    healthcheck:
      test:
        - CMD-SHELL
        - curl -s -m 2 http://localhost:8080/commands/ruok | grep error | grep null
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - signoz-net
    logging:
      options:
        max-size: 50m
        max-file: "3"

  signoz-clickhouse:
    profiles: [signoz]
    image: clickhouse/clickhouse-server:25.5.6
    container_name: signoz-clickhouse
    restart: unless-stopped
    tty: true
    depends_on:
      signoz-init-clickhouse:
        condition: service_completed_successfully
      signoz-zookeeper:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - wget
        - --spider
        - -q
        - 0.0.0.0:8123/ping
      interval: 30s
      timeout: 5s
      retries: 3
    ulimits:
      nproc: 65535
      nofile:
        soft: 262144
        hard: 262144
    environment:
      - CLICKHOUSE_SKIP_USER_SETUP=1
    volumes:
      - ./docker/signoz/clickhouse-config.xml:/etc/clickhouse-server/config.xml
      - ./docker/signoz/clickhouse-users.xml:/etc/clickhouse-server/users.xml
      - ./docker/signoz/clickhouse-custom-function.xml:/etc/clickhouse-server/custom-function.xml
      - ./docker/signoz/clickhouse-cluster.xml:/etc/clickhouse-server/config.d/cluster.xml
      - signoz_clickhouse:/var/lib/clickhouse/
      - signoz_user_scripts:/var/lib/clickhouse/user_scripts/
    networks:
      - signoz-net
    logging:
      options:
        max-size: 50m
        max-file: "3"

  signoz-telemetrystore-migrator:
    profiles: [signoz]
    image: signoz/signoz-otel-collector:${SIGNOZ_OTELCOL_TAG:-v0.142.1}
    container_name: signoz-telemetrystore-migrator
    depends_on:
      signoz-clickhouse:
        condition: service_healthy
    environment:
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_DSN=tcp://signoz-clickhouse:9000
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_CLUSTER=cluster
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_REPLICATION=true
      - SIGNOZ_OTEL_COLLECTOR_TIMEOUT=10m
    entrypoint:
      - /bin/sh
    command:
      - -c
      - |
        /signoz-otel-collector migrate bootstrap &&
        /signoz-otel-collector migrate sync up &&
        /signoz-otel-collector migrate async up
    restart: on-failure
    networks:
      - signoz-net
    logging:
      options:
        max-size: 50m
        max-file: "3"

  signoz:
    profiles: [signoz]
    image: signoz/signoz:${SIGNOZ_VERSION:-v0.112.1}
    container_name: signoz
    restart: unless-stopped
    depends_on:
      signoz-clickhouse:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - signoz_sqlite:/var/lib/signoz/
    environment:
      - SIGNOZ_ALERTMANAGER_PROVIDER=signoz
      - SIGNOZ_TELEMETRYSTORE_CLICKHOUSE_DSN=tcp://signoz-clickhouse:9000
      - SIGNOZ_SQLSTORE_SQLITE_PATH=/var/lib/signoz/signoz.db
      - SIGNOZ_TOKENIZER_JWT_SECRET=local-dev-secret
    healthcheck:
      test:
        - CMD
        - wget
        - --spider
        - -q
        - localhost:8080/api/v1/health
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - signoz-net
    logging:
      options:
        max-size: 50m
        max-file: "3"

  signoz-otel-collector:
    profiles: [signoz]
    image: signoz/signoz-otel-collector:${SIGNOZ_OTELCOL_TAG:-v0.142.1}
    container_name: signoz-otel-collector
    restart: unless-stopped
    depends_on:
      signoz-clickhouse:
        condition: service_healthy
    entrypoint:
      - /bin/sh
    command:
      - -c
      - |
        /signoz-otel-collector migrate sync check &&
        /signoz-otel-collector --config=/etc/otel-collector-config.yaml --manager-config=/etc/manager-config.yaml --copy-path=/var/tmp/collector-config.yaml
    volumes:
      - ./docker/signoz/otel-collector-config.yaml:/etc/otel-collector-config.yaml
      - ./docker/signoz/otel-collector-opamp-config.yaml:/etc/manager-config.yaml
    environment:
      - OTEL_RESOURCE_ATTRIBUTES=host.name=signoz-host,os.type=linux
      - LOW_CARDINAL_EXCEPTION_GROUPING=false
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_DSN=tcp://signoz-clickhouse:9000
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_CLUSTER=cluster
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_REPLICATION=true
      - SIGNOZ_OTEL_COLLECTOR_TIMEOUT=10m
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    networks:
      - signoz-net
    logging:
      options:
        max-size: 50m
        max-file: "3"

volumes:
  postgres_data:
  signoz_clickhouse:
    name: signoz-clickhouse
  signoz_sqlite:
    name: signoz-sqlite
  signoz_zookeeper:
    name: signoz-zookeeper
  signoz_user_scripts:
    name: signoz-user-scripts

networks:
  signoz-net:
    name: signoz-net
